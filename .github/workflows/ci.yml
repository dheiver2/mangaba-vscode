name: CI

# Testes + typecheck + build em todo push/PR (barreira de qualidade antes de publicar).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Auditoria de dependências de produção. A cadeia onnxruntime-web →
      # onnx-proto → protobufjs é conhecida, NÃO é empacotada no vsix
      # (.vscodeignore) e nunca carrega em Node — vira warning, não falha.
      - name: npm audit (produção)
        run: |
          npm audit --omit=dev --audit-level=high || \
            echo "::warning::vulnerabilidades em cadeia onnxruntime-web (excluída do vsix; não carrega em Node)"
