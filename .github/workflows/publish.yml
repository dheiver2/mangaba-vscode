name: Publish to Marketplace

# Dispara ao empurrar uma tag vX.Y.Z (a versão deve bater com o package.json).
# Requer o secret VSCE_PAT (Personal Access Token do publisher mangaba-ai).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # 1) Builds self-contained POR PLATAFORMA — RAG embutido (transformers.js) funciona
  #    de fábrica, pois cada runner traz o binário nativo do onnxruntime.
  #    (Sem darwin-x64: runners macos-13/Intel foram aposentados pela GitHub e
  #    ficam presos na fila; Macs Intel recebem a build universal.)
  platform:
    strategy:
      fail-fast: false
      # A Marketplace limita publishes concorrentes do mesmo PAT (rate limit
      # "Concurrency"/VSID) — publica uma plataforma por vez.
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build
      # onnxruntime-node empacota os binários nativos das 6 combinações de SO/arquitetura
      # dentro do MESMO pacote npm (não são optionalDependencies por plataforma), então
      # `vsce publish --target` sozinho não os remove. Sem isso, cada publish carrega
      # ~85MB/1700 arquivos à toa — o upload/scan demora e colide com o rate limit
      # "Concurrency" da Marketplace.
      - name: Podar binários de outras plataformas (onnxruntime-node)
        shell: bash
        run: |
          target="${{ matrix.target }}"
          os_part="${target%-*}"
          arch_part="${target##*-}"
          dir="node_modules/onnxruntime-node/bin/napi-v3"
          for os in linux darwin win32; do
            for arch in x64 arm64; do
              if [ "$os" != "$os_part" ] || [ "$arch" != "$arch_part" ]; then
                rm -rf "$dir/$os/$arch"
              fi
            done
          done
      - name: Publish (${{ matrix.target }})
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        # --skip-duplicate: rerun/dispatch não falha se a versão já existir.
        # Retry com backoff: a Marketplace aplica rate limit por PAT.
        run: |
          for i in 1 2 3; do
            npx --yes @vscode/vsce publish --target ${{ matrix.target }} --skip-duplicate && exit 0
            echo "tentativa $i falhou; aguardando $((i*60))s…"; sleep $((i*60))
          done
          exit 1

  # 2) Build UNIVERSAL leve — fallback para plataformas não listadas acima.
  #    RAG via Ollama (mangaba.embeddingsBackend = ollama).
  #    needs: serializa com os publishes por plataforma (rate limit do PAT).
  universal:
    needs: platform
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build
      # Build "leve": RAG local (transformers.js/onnxruntime-node) fica de fora —
      # use mangaba.embeddingsBackend=ollama (o código já trata a ausência com
      # uma mensagem amigável). Sem isso o publish carregava ~85MB à toa.
      - name: Remover deps de RAG local (usa Ollama nesta build)
        run: rm -rf node_modules/onnxruntime-node node_modules/@xenova
      - name: Publish (universal, leve)
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          for i in 1 2 3; do
            npx --yes @vscode/vsce publish --no-dependencies --skip-duplicate && exit 0
            echo "tentativa $i falhou; aguardando $((i*60))s…"; sleep $((i*60))
          done
          exit 1
