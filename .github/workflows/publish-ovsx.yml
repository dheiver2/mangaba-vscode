name: Publish to Open VSX

# Registro independente (open-vsx.org) — atende VSCodium, Cursor, Windsurf,
# Gitpod etc. Estratégia adotada enquanto o publish no VS Code Marketplace
# está bloqueado (rate limit "Concurrency"/VSID persistente na conta).
# Requer o secret OVSX_PAT (token de acesso criado em open-vsx.org).
#
# Só o build UNIVERSAL (leve, ~650KB) é publicado aqui — os builds
# por-plataforma (~85MB com binários nativos do onnxruntime) ficaram
# repetidamente travados "publicado mas inativo" no processamento do
# Open VSX (aconteceu com darwin-arm64 na v0.11.12 e win32-x64 depois).
# RAG local fica indisponível neste canal (use mangaba.embeddingsBackend
# = ollama); os builds self-contained continuam saindo normalmente na
# GitHub Release (.vsix) e no VS Code Marketplace, quando este voltar.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  universal:
    if: ${{ github.event_name != 'push' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build
      - name: Remover deps de RAG local (usa Ollama nesta build)
        run: rm -rf node_modules/onnxruntime-node node_modules/@xenova
      - name: Publish (universal, leve)
        if: ${{ env.OVSX_PAT != '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        # --no-dependencies: a build leve remove deps de propósito; sem a flag
        # o ovsx roda `npm ls` e falha com "extraneous/missing".
        run: npx --yes ovsx publish --no-dependencies --skip-duplicate -p "$OVSX_PAT"
